<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Expense & Budget Visualizer</h1>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Balance Display Section -->
            <section id="balance-display" class="balance-section">
                <h2>Total Balance</h2>
                <div id="balance-amount" class="balance-value">$0.00</div>
            </section>

            <!-- Input Form Section -->
            <section class="form-section">
                <h2>Add Transaction</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input 
                            type="text" 
                            id="item-name" 
                            placeholder="Enter item name" 
                            maxlength="100"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="Enter amount" 
                            min="0.01" 
                            max="999999.99" 
                            step="0.01"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">Add Transaction</button>
                    
                    
                </form>
            </section>

            <!-- Transaction List Section -->
            <section class="transaction-section">
                <h2>Transactions</h2>
                <div id="transaction-list-container">
                    <div id="transaction-list">
                        <!-- Transaction items dynamically inserted here -->
                    </div>
                    <div id="empty-state-message" class="empty-state-message">
                        No transactions yet. Start by adding one!
                    </div>
                </div>
            </section>

            <!-- Chart Component Section -->
            <section class="chart-section">
                <h2>Spending Distribution</h2>
                <div id="chart-component">
                    <canvas id="spending-chart"></canvas>
                    <div id="chart-error" class="chart-message chart-error hidden">
                        Error loading chart library
                    </div>
                    <div id="chart-empty" class="chart-message chart-empty hidden">
                        No spending data available
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2024 Expense & Budget Visualizer</p>
        </footer>
    </div>

    <!-- Chart.js Library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    
    <!-- Application Script -->
    <script src="js/app.js"></script>
</body>
</html>
